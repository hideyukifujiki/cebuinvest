<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- 白背景（角丸） -->
  <rect width="64" height="64" rx="12" fill="#FFFFFF"/>

  <!-- C字クレセント（濃紺・太め・最重要要素） -->
  <path d="M 14 32 A 18 18 0 1 1 50 32" stroke="#0B3A8B" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 14 32 A 18 18 0 0 0 22 47" stroke="#0B3A8B" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 太陽（イエロー・小サイズでも識別可能） -->
  <circle cx="32" cy="25" r="7" fill="#F5C518"/>

  <!-- 簡略ビル群（中サイズ以上で見える） -->
  <rect x="22" y="35" width="5" height="11" fill="#1B5BC4" rx="0.5"/>
  <rect x="28" y="31" width="6" height="15" fill="#0B3A8B" rx="0.5"/>
  <rect x="35" y="37" width="5" height="9" fill="#2BA8E0" rx="0.5"/>

  <!-- 波（ティール・下部のアクセント） -->
  <path d="M 14 50 Q 22 46 30 50 T 46 50" stroke="#2BB7B7" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
