<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- 白背景（iOSが角丸マスクをかぶせるため、余白を含めた正方形でOK） -->
  <rect width="180" height="180" rx="36" fill="#FFFFFF"/>

  <!-- C字クレセント（濃紺・最重要） -->
  <path d="M 40 90 A 50 50 0 1 1 140 90" stroke="#0B3A8B" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 40 90 A 50 50 0 0 0 60 130" stroke="#0B3A8B" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- 太陽 -->
  <circle cx="90" cy="70" r="16" fill="#F5C518"/>

  <!-- ビル群 -->
  <rect x="60" y="92" width="14" height="40" fill="#2BA8E0" rx="1"/>
  <rect x="76" y="80" width="18" height="52" fill="#1B5BC4" rx="1"/>
  <rect x="96" y="98" width="12" height="34" fill="#2BA8E0" rx="1"/>

  <!-- ヤシの木（幹） -->
  <line x1="118" y1="102" x2="118" y2="135" stroke="#2E9D4F" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ヤシの葉 -->
  <path d="M 118 102 Q 102 84 92 90 Q 110 90 118 102 Z" fill="#2E9D4F"/>
  <path d="M 118 102 Q 134 84 144 90 Q 126 90 118 102 Z" fill="#2E9D4F"/>
  <path d="M 118 102 Q 114 80 108 76 Q 116 90 118 102 Z" fill="#2E9D4F"/>
  <path d="M 118 102 Q 122 80 128 76 Q 120 90 118 102 Z" fill="#2E9D4F"/>

  <!-- 波 -->
  <path d="M 30 138 Q 50 130 70 138 T 110 138 T 150 137" stroke="#2BB7B7" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
